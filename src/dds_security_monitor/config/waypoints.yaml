# 巡邏點設定 — 可隨時編輯，執行 /patrol/reload 立刻生效
# 格式：每個點有 name, x, y（單位：公尺，Gazebo 世界座標）
#
# 設計：turtlebot3_world 中央有 9 根圓柱(±1.1,0)×(±1.1,0) r=0.15、外牆約 ±2.5。
# 巡邏走「外圈矩形」(±1.8)，沿邊不走對角線 → 全段離圓柱淨空 +0.44m、離牆 0.70m。
# （舊版在角落 ±1.5 且順序排成對角線，會輾過中央圓柱導致撞牆/翻車。）
waypoints:
  - name: "電源控制室"
    x: -1.8
    y: -1.8
  - name: "出入口"
    x:  0.0
    y: -1.8
  - name: "冷卻水塔"
    x:  1.8
    y: -1.8
  - name: "生產線B"
    x:  1.8
    y:  1.8
  - name: "生產線A"
    x: -1.8
    y:  1.8
